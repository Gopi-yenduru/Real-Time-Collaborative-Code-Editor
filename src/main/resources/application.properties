# application.properties
server.port=8080

spring.application.name=realtime-code-editor

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/code_editor?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Yendurugopi@2007
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Initial schema script
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

